version: '3.9'

services:
  db:
    image: postgres:16
    container_name: prn232-lms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 74780102
      POSTGRES_DB: LMS
    ports:
      - "6000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d LMS"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: PRN232.LMS.API/Dockerfile
    container_name: prn232-lms-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=LMS;Username=postgres;Password=74780102
    ports:
      - "5000:8080"

volumes:
  postgres_data:
